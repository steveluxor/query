# ===== RAG 主问答提示词 =====
rag:
  template: |
    你是一个智能问答助手。以下是从不同文档中检索到的相关内容，每段都标注了来源文件名。

    {context}

    {history}

    用户问题：{question}

    要求：
    1. 直接回答问题，不要提及文档检索过程或"没有找到相关文档"
    2. 只引用与问题直接相关的文档内容，忽略无关文档
    3. 引用时请注明来源文件名
    4. 如果文档中有相关信息，优先使用文档内容回答
    5. 如果文档中没有相关信息，直接用你的知识回答，不要提及检索过程
    6. 严格遵守用户在问题中提出的所有要求和限制条件

# ===== 查询改写提示词 =====
rewrite:
  # 无历史时的改写
  without_history: |
    你是一个查询改写助手。将用户的问题改写为完整的搜索查询，以便在文档库中检索相关内容。

    要求：
    - 将缩写、简写补全为完整名称（如"qt"→"Qt"、"py"→"Python"）
    - 如果问题是关于个人（如"汪小丹"），补充可能的学号、实验名称等关键词
    - 如果问题很短（少于5个字），扩展为更具体的查询
    - 保持关键术语的大小写规范

    只返回改写后的查询，不要任何额外内容。

    用户问题：{question}
    将以上问题扩展为完整的搜索查询，补充可能的文档标题关键词、学号、实验名称等。

    改写后的查询：

  # 带历史时的改写
  with_history: |
    你是一个查询改写助手。根据对话历史，将用户的最新问题改写为独立、自包含的查询，使得不需要看历史也能理解查询意图。

    改写规则：
    - 如果最新问题很简短（如"第140呢"、"那前10个呢"、"总共多少"），必须结合上一轮的问题和回答来补全意图,不要漏掉信息,比如检索范围
    - "第N呢"类追问表示"上一个问题的条件不变，只改序号"，需要从上文提取排序条件（如"贵"、"便宜"）补全到新问题中
    - 保持上一轮的排序方向和排序字段不变

    只返回改写后的查询，不要任何额外内容。如果问题本身已经很清晰，直接返回原问题。

    对话历史：
    {history}

    最新问题：{question}
    改写后的查询：

# ===== 意图分析提示词 =====
intent:
  analysis: |

    第一个字段：是否需要检索文档回答（"需要"或"不需要"）
    第二个字段：如果需要检索，采用什么策略（"relevance"或"diversity"）

    判断规则：
    - 不需要检索：问候、闲聊、通用知识（如"你是谁"、"你好"、"今天天气"）
    - 需要检索 + relevance：针对具体文档内容的精确查询（如"汪小丹的成绩"），包括排名/聚合追问（如"第二呢"、"前十名呢"、"第56之后呢"）
    - 需要检索 + diversity：需要综合多文档对比、总结、分析的查询（如"对比各同学成绩"、"总结所有实验报告"）

    上一轮用户问题：{last_question}

    问题：{question}

    回答：

# ===== 直接回答（无需检索）提示词 =====
direct_answer:
  template: |
    你是一个智能问答助手。请直接回答用户的问题。

    {history}

    用户问题：{question}

# ===== 列名识别提示词（LLM判断要加总的列） =====
identify_key:
  template: |
    以下是文档中的几条记录（key:value 格式）：
    {sample}

    问题：{question}
    请判断要加总求和的是哪个 key 对应的数值？

    注意：只能选择值为数字的 key（如'结果'、'金额'、'价格'等），不能选择文本类型的 key。
    只返回 key 名，不要其他内容。
