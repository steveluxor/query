# P6Spy 配置
modulelist=com.p6spy.engine.spy.P6SpyFactory,com.p6spy.engine.logging.P6LogFactory

# 使用 SLF4J 日志
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 自定义日志格式
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(currentTime) | %(executionTime)ms | %(category) | %(effectiveSql)

# 慢查询阈值（毫秒），超过此时间记录到日志
outagedetection=true
outagedetectioninterval=0

# 是否记录完整 SQL（true=展开参数，false=使用?占位符）
databaseDialectDateFormat=yyyy-MM-dd HH:mm:ss
