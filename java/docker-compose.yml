version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis7
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/opt/redis-stack/redis.conf
      - redis-data:/data
    command: redis-server /opt/redis-stack/redis.conf
    restart: unless-stopped

volumes:
  minio-data:
  redis-data:
